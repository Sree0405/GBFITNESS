<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>GB Fitness | Elite Gym & Performance Center</title>
    <meta
      name="description"
      content="GB Fitness is a premium gym and performance center offering elite training, modern equipment, and personalized fitness programs. Transform your body and elevate your lifestyle."
    />
    <meta name="keywords" content="gym, fitness, personal training, bodybuilding, crossfit, GB Fitness, premium gym" />
    <meta name="author" content="GB Fitness" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/gb-logo-1.png" />
    <link rel="apple-touch-icon" href="/gb-logo-1.png" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:title" content="GB Fitness | Elite Gym & Performance Center" />
    <meta
      property="og:description"
      content="Join GB Fitness and experience world-class training, expert coaches, and luxury facilities. Start your transformation today."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.gbfitness.com" />
    <meta property="og:image" content="/og-gb-fitness-banner.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GB Fitness | Elite Gym & Performance Center" />
    <meta
      name="twitter:description"
      content="Premium gym with expert trainers, personalized programs, and modern facilities. Train smarter. Get stronger."
    />
    <meta name="twitter:image" content="/og-gb-fitness-banner.jpg" />

    <!-- Theme Color (Mobile Browsers) -->
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Preconnect (Optional Performance Boost) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  </head>

  <body>
    <!-- App Root -->
    <div id="root"></div>

    <!-- Main App Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
